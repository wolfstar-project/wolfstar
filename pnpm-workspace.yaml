# Delay installs of very new releases by 24h as a supply-chain safety buffer.
minimumReleaseAge: 1440

allowBuilds:
    '@prisma/client': true
    '@prisma/engines': true
    '@tailwindcss/oxide': true
    better-sqlite3: true
    bufferutil: false
    # Required by current lockfile; pnpm v11 blocks install unless explicitly approved.
    esbuild: true
    prisma: true
    sharp@0.34.5: true
    workerd: true
    zlib-sync: false

overrides:
    ansi-regex: ^5.0.1
    discord-api-types: ^0.38.34
    minimist: ^1.2.8

dedupePeers: true

shellEmulator: true
